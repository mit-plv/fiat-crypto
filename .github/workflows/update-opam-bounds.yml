name: Update Opam Bounds

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: '0 0 * * *'

jobs:
  check-opam-bounds:
    runs-on: ubuntu-latest
    name: check-opam-bounds (${{ github.event_name }})
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Update opam bounds
      run: etc/update-opam-bounds.sh
    - name: Show diff
      run: git diff --word-diff

  update-opam-bounds:
    runs-on: ubuntu-latest
    if: ((github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    environment:
      name: version-bump
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
    - uses: actions/create-github-app-token@v3
      id: app-token
      with:
        app-id: ${{ vars.VERSION_BUMPER_APPID }}
        private-key: ${{ secrets.VERSION_BUMPER_SECRET }}
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token }}
    - name: Update opam bounds
      run: etc/update-opam-bounds.sh
    - name: Show diff
      run: git diff --word-diff
    - name: Commit and push opam bound updates
      run: |
        if git diff --quiet *.opam; then
          echo "No opam bound changes to commit"
          exit 0
        fi
        git config http.sslVerify false
        git config user.name "Automated Publisher"
        git config user.email "actions@users.noreply.github.com"
        git remote update
        git show-ref # useful for debugging
        git branch --verbose

        git checkout -b temp
        git branch -D master || true
        git checkout -b master origin/master
        git add *.opam
        timestamp=$(date -u)
        git commit -m "Automated Opam Bound Update: ${timestamp} ${GITHUB_SHA}"
        if git push origin master; then
          echo "Push successful"
        else
          git checkout -b opam-bound-update
          git push --force --set-upstream origin opam-bound-update
          # Check if a PR already exists for this branch
          EXISTING_PR="$(gh pr list --head opam-bound-update --base master --json url --jq '.[0].url' --repo ${{ github.repository }} 2>/dev/null || true)"
          if [ -n "$EXISTING_PR" ]; then
            echo "Updated existing PR: $EXISTING_PR"
          else
            FAILURE_MESSAGE="PR creation failed"
            # Locate workflow file, remove the Git ref at the end
            WORKFLOW_PATH="${GITHUB_WORKFLOW_REF%@*}"
            # Split the string to insert the blob/SHA part correctly
            REPO_PATH="${WORKFLOW_PATH%/.github/*}"  # This extracts 'everything before /.github/'
            WORKFLOW_FILE_PATH=".github/${WORKFLOW_PATH#*.github/}"  # This extracts '.github/...'
            WORKFLOW_URL="https://github.com/${REPO_PATH}/blob/${{ github.sha }}/${WORKFLOW_FILE_PATH}"
            # Attempt to create a pull request via gh CLI, capture output even if it fails
            PR_OUTPUT="$(gh pr create --title "Opam Bound Update" \
                                    --body "This PR is auto-generated by [GitHub Actions](${WORKFLOW_URL})." \
                                    --base master --head opam-bound-update \
                                    --label "automated pr,skip ci" \
                                    --repo ${{ github.repository }} \
                          || echo "${FAILURE_MESSAGE}")"
            echo "PR output: $PR_OUTPUT"
            # Check if PR creation was successful and proceed with auto-merge
            if [[ "$PR_OUTPUT" != *"$FAILURE_MESSAGE" ]]; then
              if ! gh pr merge --admin --squash --delete-branch $PR_OUTPUT; then
                echo "Immediate merge with --admin failed, attempting auto-merge without --admin"
                gh pr merge --auto --squash --delete-branch $PR_OUTPUT
              fi
            else
              echo "Skipping auto-merge as PR creation failed"
              exit 1
            fi
          fi
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
